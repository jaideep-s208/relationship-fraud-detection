<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>All Users</title>

    <style>
        body{
            font-family:Segoe UI,Arial;
            background:#f4f6f9;
            margin:0;
        }

        .header{
            text-align:center;
            padding:20px;
        }

        button{
            padding:8px 14px;
            margin:5px;
            border-radius:6px;
            border:none;
            cursor:pointer;
        }

        .primary{ background:#1976d2;color:white; }
        .danger{ background:#e53935;color:white; }

        #search{
            width:300px;
            padding:10px;
            margin:10px auto;
            display:block;
        }

        #list{
            width:60%;
            margin:20px auto;
        }

        .card{
            background:white;
            padding:15px;
            margin:12px 0;
            border-radius:10px;
            box-shadow:0 2px 8px rgba(0,0,0,0.1);
            cursor:pointer;
            transition:0.2s;
        }

        .card:hover{
            transform:scale(1.02);
        }

        .suspicious{
            border-left:6px solid #e53935;
        }
    </style>
</head>

<body>

<div class="header">
    <h2>All Users</h2>
    <button class="primary" onclick="showAll()">Show All Users</button>
    <button class="danger" onclick="showSuspicious()">Show Suspicious</button>
</div>

<input id="search" placeholder="Search user...">

<div id="list"></div>

<script>

    let users=[];
    let suspiciousSet=new Set();

    async function init(){
        users = await fetch("/users").then(r=>r.json());

        // get suspicious users
        const suspicious = await fetch("/api/relationships/suspicious/U1")
            .then(r=>r.json());

        suspicious.nodes.forEach(n=>{
            suspiciousSet.add(n.id);
        });

        render(users);
    }

    function render(data){
        const list=document.getElementById("list");
        list.innerHTML="";

        data.forEach(u=>{
            const div=document.createElement("div");
            div.className="card";

            if(suspiciousSet.has(u.id)){
                div.classList.add("suspicious");
            }

            div.innerHTML=`
            <b>ID:</b> ${u.id}<br>
            <b>Email:</b> ${u.email ?? ""}<br>
             <b>Address:</b> ${u.address ?? ""}<br>
            <b>Phone:</b> ${u.phone ?? ""}
        `;

            list.appendChild(div);
        });
    }

    function showAll(){
        render(users);
    }

    function showSuspicious(){
        render(users.filter(u=>suspiciousSet.has(u.id)));
    }

    document.getElementById("search")
        .addEventListener("input",e=>{
            const val=e.target.value.toLowerCase();
            render(users.filter(u=>u.id.toLowerCase().includes(val)));
        });

    init();

</script>

</body>
</html>

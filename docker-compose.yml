version: "3.9"

services:

  neo4j:
    image: neo4j:5.20
    container_name: neo4j-db
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/password
    volumes:
      - neo4j_data:/data

  app:
    build: .
    container_name: relationship-app
    ports:
      - "8080:8080"
    depends_on:
      - neo4j
    environment:
      SPRING_NEO4J_URI: bolt://neo4j:7687
      SPRING_NEO4J_AUTHENTICATION_USERNAME: neo4j
      SPRING_NEO4J_AUTHENTICATION_PASSWORD: password

volumes:
  neo4j_data: